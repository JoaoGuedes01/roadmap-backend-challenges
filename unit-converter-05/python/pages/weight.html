<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Converter - Weight</title>
  </head>
  <body>
    <h1>Unit Converter - Weight</h1>
    <nav>
      <button onclick="location.href = 'length.html'">Length</button>
      <button onclick="location.href = 'weight.html'" disabled>Weight</button>
      <button onclick="location.href = 'temp.html'">Temperature</button>
    </nav>
    <form method="POST" target="_self">
      <input
        type="number"
        id="inputValue"
        name="inputValue"
        placeholder="Enter value"
        required
      />
      <select id="fromUnit" name="fromUnit" required>
        <option value="" disabled selected>Select input unit</option>
        <option value="mg">Milligrams</option>
        <option value="g">Grams</option>
        <option value="kg">Kilograms</option>
        <option value="oz">Ounces</option>
        <option value="lb">Pounds</option>
      </select>
      <select id="toUnit" name="toUnit" required>
        <option value="" disabled selected>Select output unit</option>
        <option value="mg">Milligrams</option>
        <option value="g">Grams</option>
        <option value="kg">Kilograms</option>
        <option value="oz">Ounces</option>
        <option value="lb">Pounds</option>
      </select>
      <button type="submit">Convert</button>
    </form>
  </body>
</html>
